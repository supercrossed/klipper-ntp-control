# Mainsail/Fluidd macros for TTC Fix controls
# Add this to your printer.cfg: [include ttc_macros.cfg]
#
# These macros appear as clickable buttons in the Mainsail/Fluidd macro panel.
# With default settings, all fixes are applied automatically at startup.
# These macros are only needed for manual override or status checks.

# Show the current state of all TTC timing fixes: NTP, CPU governor,
# USB autosuspend, and Wi-Fi power save. Output is printed to the
# Klipper console.
[gcode_macro TTC_STATUS]
description: Report status of all TTC timing fixes
gcode:
    TTC_STATUS

# Re-enable NTP time sync. Use this if you need NTP temporarily while
# Klipper is running (e.g., for manual time correction). Be aware that
# NTP clock adjustments can cause MCU timing errors.
[gcode_macro NTP_ON]
description: Enable NTP time synchronization
gcode:
    NTP_ENABLE

# Manually disable NTP time sync. NTP clock slewing causes all MCU adj
# values to drift simultaneously, which can trigger timing errors on the
# busiest MCU (typically a CAN toolhead).
[gcode_macro NTP_OFF]
description: Disable NTP time synchronization
gcode:
    NTP_DISABLE

# Reads the current NTP state from printer.ttc_fix.ntp_active (exposed
# by the ttc_fix extra via get_status) and flips it. Acts as a single
# on/off button in Mainsail.
[gcode_macro NTP_TOGGLE]
description: Toggle NTP synchronization on/off
gcode:
    {% if printer.ttc_fix.ntp_active %}
        NTP_DISABLE
    {% else %}
        NTP_ENABLE
    {% endif %}
