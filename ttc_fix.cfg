# TTC Fix for Klipper — prevents MCU timing/scheduling errors
# Add this to your printer.cfg: [include ttc_fix.cfg]
#
# This replaces ntp_control.cfg — do NOT include both.

[ttc_fix]
# --- NTP ---
# Disable NTP clock slewing (timesyncd) while Klipper is running.
# NTP frequency adjustments cause all MCU adj values to drift simultaneously,
# triggering timing errors on the busiest MCU (typically a CAN toolhead).
manage_ntp: True

# Whether timedatectl requires sudo. Most Klipper setups need this since
# klippy runs as a systemd service without a polkit session.
use_sudo: True

# --- CPU Governor ---
# Force all CPU cores to 'performance' governor while Klipper is running.
# Frequency scaling causes timing jitter that can push MCUs past their
# scheduling deadline.
manage_cpu_governor: True

# --- USB Autosuspend ---
# Disable USB autosuspend on all devices while Klipper is running.
# Linux power management can momentarily suspend USB devices, causing
# communication gaps with USB-connected MCUs.
manage_usb_autosuspend: True

# --- Wi-Fi Power Save ---
# Disable Wi-Fi power save mode while Klipper is running.
# Power save causes latency spikes that can starve Klipper's timing loop,
# especially on setups that communicate with Moonraker over Wi-Fi.
manage_wifi_power_save: True

# Wi-Fi interface name (usually wlan0). Ignored if the interface doesn't exist.
wifi_interface: wlan0
