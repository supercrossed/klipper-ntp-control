# Mainsail/Fluidd macros for NTP control
# Add this to your printer.cfg: [include ntp_macros.cfg]
#
# These macros appear as clickable buttons in the Mainsail/Fluidd macro panel.
# With auto_manage enabled (default), NTP is handled automatically and these
# are only needed for manual override.

# Re-enable NTP time sync. Use this after a print if you disabled NTP manually
# and want the system clock to resync before Klipper shuts down.
[gcode_macro NTP_ON]
description: Enable NTP time synchronization
gcode:
    NTP_ENABLE

# Manually disable NTP time sync. Useful if auto_manage is off and you want
# to disable NTP before starting a print. NTP clock adjustments cause all
# MCU adj values to drift simultaneously, which can trigger timing errors
# on the busiest MCU (typically a CAN toolhead).
[gcode_macro NTP_OFF]
description: Disable NTP time synchronization (recommended during prints)
gcode:
    NTP_DISABLE

# Query whether NTP is currently active or inactive. The result is printed
# to the Klipper console.
[gcode_macro NTP_CHECK]
description: Check current NTP synchronization status
gcode:
    NTP_STATUS

# Reads the current NTP state from printer.ntp_control.ntp_active (exposed
# by the ntp_control extra via get_status) and flips it. If NTP is on, this
# turns it off, and vice versa. Acts as a single on/off button in Mainsail.
[gcode_macro NTP_TOGGLE]
description: Toggle NTP synchronization on/off
gcode:
    {% if printer.ntp_control.ntp_active %}
        NTP_DISABLE
    {% else %}
        NTP_ENABLE
    {% endif %}
