# NTP Control for Klipper
# Add this to your printer.cfg: [include ntp_control.cfg]

[ntp_control]
# Automatically disable NTP when a print starts and re-enable when it ends.
# Set to False to only use manual NTP_ENABLE / NTP_DISABLE gcode commands.
auto_manage: True

# Whether timedatectl requires sudo. Most Klipper setups need this since
# klippy runs as a systemd service without a polkit session.
# Set to False only if you installed the polkit rule instead of sudoers.
use_sudo: True
